<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicago 2026 — Itinerario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:ital,wght@0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1f1f1f; --sub:#6b6b68; --line:#ebe9e4; --card:#faf9f6; --bg:#ffffff;
    --accent:#0B3B5C; --accent-soft:#eef2f5; --red:#C8102E;
    --green:#2f7a4f; --green-bg:#eef6f0; --amber:#9c6b0f; --amber-bg:#fbf3e3;
    --peach:#a85a2e; --peach-bg:#faeee3;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.5;}
  ::selection{background:var(--accent); color:#fff;}

  .cover{position:relative; height:190px; overflow:hidden; background:linear-gradient(135deg,#0B3B5C 0%,#123a56 45%,#3a6d8a 100%);}
  .cover svg{position:absolute; inset:0; width:100%; height:100%;}
  .cover-text{position:absolute; left:0; right:0; bottom:0; padding:26px 28px 20px; color:#fff; z-index:2;}
  .cover-eyebrow{font-size:11.5px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; opacity:.8; margin-bottom:6px;}
  .cover-title{font-size:clamp(28px,5vw,42px); font-weight:800; letter-spacing:-.02em; margin:0;}
  .cover-sub{font-family:'Source Serif 4', serif; font-style:italic; font-size:14.5px; opacity:.85; margin-top:4px;}

  .meta-row{display:flex; flex-wrap:wrap; gap:10px; padding:18px 28px; max-width:900px; margin:0 auto; justify-content:center;}
  .meta-chip{font-size:12.5px; font-weight:600; color:var(--accent); background:var(--accent-soft); padding:7px 14px; border-radius:99px;}

  .tabs-wrap{position:sticky; top:0; z-index:40; background:rgba(255,255,255,.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:10px 0;}
  .tabs{display:flex; gap:6px; max-width:900px; margin:0 auto; padding:0 20px; overflow-x:auto; scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto; border:none; background:transparent; color:var(--sub); font-family:'Inter'; font-weight:600; font-size:13px; padding:9px 15px; border-radius:99px; cursor:pointer; white-space:nowrap; transition:.15s;}
  .tab:hover{background:var(--card);}
  .tab.active{background:var(--ink); color:#fff;}

  .wrap{max-width:820px; margin:0 auto; padding:34px 20px 24px;}
  .panel{display:none;}
  .panel.active{display:block; animation:fade .3s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

  .day-illus{border-radius:var(--radius); overflow:hidden; height:170px; margin-bottom:20px; position:relative;}
  .day-illus svg{width:100%; height:100%; display:block;}

  .day-head{margin-bottom:18px;}
  .day-eyebrow{font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--sub);}
  .day-title{font-size:26px; font-weight:800; letter-spacing:-.01em; margin:2px 0 3px;}
  .day-date{font-family:'Source Serif 4'; font-style:italic; color:var(--sub); font-size:14.5px;}

  .cards-row{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:22px;}
  @media (max-width:560px){ .cards-row{grid-template-columns:1fr;} }
  .info-card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px;}
  .info-card h4{margin:0 0 10px; font-size:11.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--sub); display:flex; align-items:center; gap:6px;}
  .weather-main{display:flex; align-items:baseline; gap:10px;}
  .weather-temp{font-size:26px; font-weight:800;}
  .weather-temp small{font-size:14px; font-weight:600; color:var(--sub);}
  .weather-rain{font-size:12.5px; color:var(--sub); margin-top:6px;}
  .weather-note{font-size:11px; color:#9a9a96; margin-top:8px; line-height:1.4;}
  .summary-list{list-style:none; margin:0; padding:0; font-size:13px; display:flex; flex-direction:column; gap:8px;}
  .summary-list li{display:flex; justify-content:space-between; gap:10px; color:var(--ink);}
  .summary-list li span.k{color:var(--sub);}

  .timeline{position:relative; padding-left:26px;}
  .timeline::before{content:""; position:absolute; left:7px; top:6px; bottom:6px; width:1.5px; background:var(--line);}
  .item{position:relative; padding-bottom:22px; cursor:pointer; user-select:none;}
  .item:last-child{padding-bottom:0;}
  .check{position:absolute; left:-26px; top:2px; width:16px; height:16px; border-radius:50%; background:#fff; border:1.5px solid #c9c6bf; transition:.15s; display:flex; align-items:center; justify-content:center;}
  .check svg{width:9px; height:9px; opacity:0; transition:.15s;}
  .item.done .check{background:var(--accent); border-color:var(--accent);}
  .item.done .check svg{opacity:1;}
  .item.done h3, .item.done .time{opacity:.4; text-decoration:line-through;}
  .item.done p{opacity:.4;}
  .item .time{font-weight:700; font-size:13.5px; color:var(--accent); letter-spacing:.01em;}
  .item h3{margin:3px 0 4px; font-size:15.5px; font-weight:700; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .price{font-size:11px; font-weight:700; padding:2px 9px; border-radius:99px; white-space:nowrap;}
  .price.free{background:var(--green-bg); color:var(--green);}
  .price.paid{background:var(--amber-bg); color:var(--amber);}
  .price.food{background:var(--peach-bg); color:var(--peach);}
  .price.info{background:var(--line); color:var(--sub);}
  .item p{margin:0; font-size:14px; line-height:1.55; color:#4a4a47;}
  .item .meta{display:flex; gap:8px; flex-wrap:wrap; margin-top:7px;}
  .tag{font-size:11px; font-weight:600; color:var(--sub); background:var(--card); padding:3px 9px; border-radius:5px; border:1px solid var(--line);}

  .dial-box{margin-top:20px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; font-size:13px; color:var(--sub); display:flex; align-items:center; gap:14px;}
  .dial-box b{color:var(--ink);}

  .tips-card{margin-top:26px; background:var(--accent-soft); border-radius:var(--radius); padding:18px 20px;}
  .tips-card h4{margin:0 0 10px; font-size:11.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--accent);}
  .tips-card ul{margin:0; padding-left:18px; display:flex; flex-direction:column; gap:7px;}
  .tips-card li{font-size:13.5px; line-height:1.5; color:#334; }

  .footer-actions{max-width:820px; margin:8px auto 60px; padding:0 20px; display:flex; gap:10px; flex-wrap:wrap;}
  .fbtn{flex:1; min-width:160px; text-align:center; padding:13px 16px; border-radius:12px; font-weight:700; font-size:13.5px; cursor:pointer; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; gap:8px; background:#fff;}
  .fbtn.primary{background:var(--ink); color:#fff; border-color:var(--ink);}
  .fbtn svg{width:15px; height:15px;}
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:11px 20px; border-radius:8px; font-size:13px; opacity:0; transition:.25s; pointer-events:none; z-index:100;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .progress-pill{font-size:11px; font-weight:700; color:var(--sub); background:var(--card); border:1px solid var(--line); padding:4px 10px; border-radius:99px; margin-left:auto;}
  .head-row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
</style>
</head>

const tabsEl = document.getElementById('tabs');
const panels = document.getElementById('panels');

days.forEach((d,i)=>{
  const tab = document.createElement('button');
  tab.className = 'tab' + (i===1?' active':'');
  tab.textContent = d.tag;
  tab.addEventListener('click', ()=>select(i));
  tabsEl.appendChild(tab);

  const panel = document.createElement('div');
  panel.className = 'panel' + (i===1?' active':'');

  const itemsHtml = d.items.map((it,ii)=>`
    <div class="item" data-day="${i}" data-item="${ii}">
      <div class="check">${CHECK_SVG}</div>
      <div class="time">${it.time}</div>
      <h3>${it.h} ${priceTag(it)}</h3>
      <p>${it.p}</p>
      ${it.tags && it.tags.length ? `<div class="meta">${it.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');

  const tipsHtml = d.tips && d.tips.length ? `
    <div class="tips-card">
      <h4>💡 Recomendaciones para hoy</h4>
      <ul>${d.tips.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>` : '';

  panel.innerHTML = `
    <div class="day-illus">${ILLUS[d.illus]}</div>
    <div class="day-head">
      <div class="head-row">
        <div>
          <div class="day-eyebrow">${d.tag} · ${d.date}</div>
          <div class="day-title">${d.title}</div>
          <div class="day-date">${d.zone}</div>
        </div>
        <span class="progress-pill" data-label="${i}">0 / ${d.items.length}</span>
      </div>
    </div>
    <div class="cards-row">
      <div class="info-card">
        <h4>☁️ Clima del día</h4>
        <div class="weather-main"><span class="weather-temp">${d.weather.hi}°<small>/${d.weather.lo}°C</small></span></div>
        <div class="weather-rain">💧 Probabilidad de lluvia: ${d.weather.rain}%</div>
        <div class="weather-note">Promedio histórico para la fecha (no es un pronóstico — aún está lejos para eso).</div>
      </div>
      <div class="info-card">
        <h4>📋 Resumen del día</h4>
        <ul class="summary-list">
          <li><span class="k">Zona</span><span>${d.zone}</span></li>
          <li><span class="k">Presupuesto</span><span>${d.budget}</span></li>
          <li><span class="k">Caminando</span><span>${d.walk}</span></li>
        </ul>
      </div>
    </div>
    ${d.dial ? `<div class="dial-box">🚗 <span>${d.dial}</span></div>` : ''}
    <div class="timeline">${itemsHtml}</div>
    ${tipsHtml}
  `;
  panels.appendChild(panel);
});

function select(i){
  document.querySelectorAll('.tab').forEach((t,ti)=>t.classList.toggle('active', ti===i));
  document.querySelectorAll('.panel').forEach((p,pi)=>p.classList.toggle('active', pi===i));
}

function updateDayProgress(dayIdx){
  const items = document.querySelectorAll(`.item[data-day="${dayIdx}"]`);
  const done = document.querySelectorAll(`.item[data-day="${dayIdx}"].done`).length;
  const label = document.querySelector(`[data-label="${dayIdx}"]`);
  if(label) label.textContent = `${done} / ${items.length}`;
}
panels.addEventListener('click', (e)=>{
  const item = e.target.closest('.item');
  if(!item) return;
  item.classList.toggle('done');
  updateDayProgress(item.dataset.day);
});
days.forEach((d,i)=>updateDayProgress(i));

const toast = document.getElementById('toast');
function showToast(msg){ toast.textContent = msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'), 2200); }
document.getElementById('shareBtn').addEventListener('click', async ()=>{
  try{ await navigator.clipboard.writeText(window.location.href); showToast('Enlace copiado'); }
  catch(e){ showToast('Guarda este archivo y compártelo directamente'); }
});
document.getElementById('printBtn').addEventListener('click', ()=> window.print());
</script>
